apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  spec:
  replicas: {{ .Values.replicaCount }}

  revisionHistoryLimit: 3
  progressDeadlineSeconds: 300
  minReadySeconds: 50

  selector:
    matchLabels:
      app: backend-pod

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: backend-pod

    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.port }}

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MONGO_URI

            - name: APP_NAME
              value: "{{ .Values.env.APP_NAME }}"

            - name: PORT
              value: "{{ .Values.env.PORT }}"

          resources:
            requests:
              memory: "128Mi"
              cpu: "500m"
            limits:
              memory: "256Mi"
              cpu: "1"